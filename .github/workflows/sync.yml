name: Sync to Gitee

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch: # 允許手動強制同步

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 先把 GitHub 專案的代碼拉下來（解決 Empty workdir 警告）
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 同步所有的代碼、分支和 Commit
      - name: Mirror the GitHub repos to Gitee
        uses: Yikun/hub-mirror-action@master
        with:
          src: github/${{ github.repository_owner }}
          dst: gitee/${{ secrets.GITEE_USER }}
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          static_list: "${{ github.event.repository.name }}"
          force_update: true

      # 3. 強制將 GitHub 的所有 Release（包含 zip 檔案）覆蓋並全量同步到 Gitee
      - name: Sync All Releases and Zip Files
        uses: xgfone/action-gitee-release@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # 這是 GitHub 內建變數，不需要去 Secrets 設定
          gitee_token: ${{ secrets.GITEE_TOKEN }}
          gitee_repo: ${{ secrets.GITEE_USER }}/${{ github.event.repository.name }}

name: Sync to Gitee

on:
  push:
    branches:
      - main
  release:
    types: [published] # 當 GitHub 發布新 Release 時觸發

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror the GitHub repos to Gitee
        uses: Yikun/hub-mirror-action@master
        with:
          src: github/${{ github.repository_owner }}
          dst: gitee/${{ secrets.GITEE_USER }}
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          static_list: "${{ github.event.repository.name }}"
          force_update: true

      - name: Sync Release to Gitee
        if: github.event_name == 'release' # 只有發布 Release 時才執行這一步
        uses: up9cloud/action-gitee-release@master
        with:
          gitee_token: ${{ secrets.GITEE_TOKEN }}
          gitee_username: ${{ secrets.GITEE_USER }}
          gitee_repo: ${{ github.event.repository.name }}
          gitee_repo_owner: ${{ secrets.GITEE_USER }}

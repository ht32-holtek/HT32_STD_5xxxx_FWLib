name: Sync Release to Gitee

on:
  release:
    types: [published] # 只有當你在 GitHub 點擊發布新 Release 時才觸發

jobs:
  sync-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create Release on Gitee via API
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ secrets.GITEE_USER }}
          GITEE_REPO: ${{ github.event.repository.name }}
        run: |
          echo "偵測到 GitHub 發布新版本，正在同步至 Gitee 發行版面板..."
          
          TAG_NAME="${{ github.event.release.tag_name }}"
          RELEASE_NAME="${{ github.event.release.name }}"
          RELEASE_BODY="${{ github.event.release.body }}"
          
          # 直接調用 Gitee 官方 API 創建發行版（它會自動綁定同名的 Git Tag）
          curl -X POST "https://gitee.com{GITEE_OWNER}/${GITEE_REPO}/releases" \
            -F "access_token=${GITEE_TOKEN}" \
            -F "tag_name=${TAG_NAME}" \
            -F "name=${RELEASE_NAME}" \
            -F "body=${RELEASE_BODY}"
            
          echo "Gitee 發行版面板同步建立完成！Gitee 將會自動生成該 Tag 的 zip 下載連結。"
